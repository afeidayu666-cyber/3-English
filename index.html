function grantGun(o){S.gun=true;S.weaponMode=currentLevel().from===1900?'shock':'freeze';S.xp+=20;S.fails=0;if(!S.cleared.includes(o.id))S.cleared.push(o.id);save();ui();let shock=S.weaponMode==='shock';card.innerHTML=`<div class="stars">★★★</div><h2>获得${shock?'冲击枪':'冰冻枪'}！</h2><p>${shock?'点击宇航员发射冲击波。章鱼守卫需要学习后再发射第二次。':'点击宇航员开枪，冻结距离最近的一只怪物5秒。'}</p><button class="primary" id="takeGun">拿起武器</button>`;takeGun.onclick=()=>{modal.classList.remove('show');busy=false;toast(shock?'点击宇航员发射冲击波！':'点击宇航员冻结最近的怪物！')}}
function spell(q,o){renderSpell(q,o,false,false)}
function renderSpell(q,o,correction,mustReturn){let target=q.word.toLowerCase().replace(/\s/g,''),letters=target.split('').sort(()=>Math.random()-.5),ans='';card.innerHTML=`<span class="tag">${q.grade} · ${q.unit||''}</span><h2>${correction?'照着正确答案再拼一次':'单词拼读任务'}</h2>${correction?`<div class="speech" style="text-align:center;background:#d9ffd9!important">正确答案：<b style="font-size:32px;color:#d62f68">${q.word}</b></div>`:''}<div class="prompt">${q.cn}</div><div class="hint">${correction?'看清字母顺序，拼对后才能继续':'先听一遍，再按顺序组词'}</div><button class="secondary" id="listen">🔊 听单词</button><div class="answer" id="answer">?</div><div class="letters">${letters.map((x,i)=>`<button data-letter="${x}" data-i="${i}">${x}</button>`).join('')}</div><button class="secondary" id="clear">重新排列</button><button class="primary" id="submit">${correction?'检查并继续':'提交答案'}</button>`;modal.classList.add('show');listen.onclick=()=>speak(q.word);card.querySelectorAll('[data-letter]').forEach(b=>b.onclick=()=>{ans+=b.dataset.letter;b.disabled=true;answer.textContent=ans});clear.onclick=()=>renderSpell(q,o,correction,mustReturn);submit.onclick=()=>{if(ans.toLowerCase()===target){if(mustReturn){S.xp+=10;save();ui();modal.classList.remove('show');setTimeout(headquarters,250)}else finish(true,o,q.word)}else if(correction){answer.textContent=ans||'?';answer.style.color='#e23858';tone(150,.16);toast('还差一点，请照着正确答案重新拼')}else{S.hp=Math.max(0,S.hp-1);S.fails++;let back=S.hp<=0||S.fails>=5;save();ui();tone(150,.18);renderSpell(q,o,true,back)}}}
function talk(q,o){card.innerHTML=`<span class="tag">${q.grade} · ${q.unit||''}</span><h2>英语对话暗号</h2><div class="speech">👽 ${q.q}</div><div class="hint">选择最自然的下一句，再跟读完整对话</div><div class="options">${q.options.map((x,i)=>`<button data-a="${i}">${x}</button>`).join('')}</div><button class="secondary" id="listen">🔊 听问题</button>`;modal.classList.add('show');listen.onclick=()=>speak(q.q);card.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{b.classList.add(+b.dataset.a===q.a?'correct':'wrong');setTimeout(()=>finish(+b.dataset.a===q.a,o,q.options[q.a]),350)})}
function finish(ok,o,correct){if(ok){S.xp+=20;S.fails=0;if(o.k==='monster'||o.k==='boss')return rewardChoice(o);if(!S.cleared.includes(o.id))S.cleared.push(o.id);modal.classList.remove('show');busy=false;toast(o.mode==='dialogue'?'火星暗号正确，通道开启！':'任务完成！');speak('Great job!')}else{S.hp--;S.fails++;ui();if(S.hp<=0||S.fails>=5){modal.classList.remove('show');setTimeout(headquarters,350)}else{card.innerHTML+=`<div class="speech">❌ 暗号错误！正确答案：<b>${correct}</b></div><button class="primary" id="again">记住了，继续</button>`;again.onclick=()=>{modal.classList.remove('show');busy=false}}}save();ui()}
function rewardChoice(o){speak('Great job!');card.innerHTML=`<div class="stars">★★★</div><h2>回答正确！</h2><p>获得20经验。选择本次任务奖励：</p><button class="primary" id="oneShot">❄️ 获得一发冰冻弹</button><button class="secondary" id="defeatNow">💥 消灭${o.label}</button>`;oneShot.onclick=()=>{S.gun=true;save();ui();modal.classList.remove('show');busy=false;autoEncounterId=o.id;toast('获得一发冰冻弹，点击火柴人开枪')};defeatNow.onclick=()=>{if(!S.cleared.includes(o.id))S.cleared.push(o.id);if(o.ambush){objects.splice(objects.indexOf(o),1);nextAmbushAt=Date.now()+12000+Math.random()*9000}else o.respawnAt=Date.now()+15000;save();ui();modal.classList.remove('show');busy=false;toast(o.ambush?'突袭怪被消灭，暂时安全！':o.label+'被消灭！15秒后出现新怪物')}}
function resetMission(){let fromCheckpoint=S.chapter>=2&&S.chapterCelebrated;S.x=fromCheckpoint?5150:320;S.y=Math.max(115,H*.67-25);S.hp=5;S.xp=fromCheckpoint?S.checkpointXp:0;S.cleared=fromCheckpoint?[...S.checkpointCleared]:[];S.fails=0;S.gun=false;S.weaponMode='freeze';S.cursor=fromCheckpoint?S.checkpointCursor:0;S.refills=0;if(!fromCheckpoint){S.chapter=1;S.chapterCelebrated=false;S.checkpointXp=0;S.checkpointCursor=0;S.checkpointCleared=[]}letterBullets=[];objects.filter(o=>o.ambush).forEach(o=>objects.splice(objects.indexOf(o),1));objects.forEach(o=>{o.phase=0;o.frozenUntil=0;o.respawnAt=0});save();ui();busy=true;card.innerHTML=`<div class="stars">🚀</div><h2>氧气补给次数已用完</h2><p>${fromCheckpoint?'从第二环节检查点重新开始，前三关进度已经保留。':'第一环节任务重新开始，经验、武器和关卡进度已经重置。'}</p><button class="primary" id="restartMission">${fromCheckpoint?'重启第二环节':'从第一关重新出发'}</button>`;modal.classList.add('show');restartMission.onclick=()=>{modal.classList.remove('show');busy=false;toast(fromCheckpoint?'任务重启：第二环节·冰雪星球':'任务重启：第一关·月球救援')}}
function headquarters(){if(S.refills>=2)return resetMission();S.refills++;save();busy=true;let text=dialogs[Math.floor(Math.random()*dialogs.length)],left=2-S.refills;card.innerHTML=`<span class="tag">🚀 救援太空舱 · 氧气补给 ${S.refills}/2</span><h2>生命维持舱</h2><div class="speech" style="white-space:pre-line">${text}</div><div class="hint">本局补给后还可返回 ${left} 次。听示范后点击麦克风录音。</div><div><button class="secondary" id="demo">🔊 听示范</button></div><button class="mic" id="mic">🎙️</button><div id="readState" class="hint">点击麦克风开始录音</div>`;modal.classList.add('show');demo.onclick=()=>speak(text.replaceAll(/A:|B:/g,''));mic.onclick=()=>recognize(text)}
function recognize(text){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){readState.textContent='当前浏览器不支持语音识别，请改用最新版 Chrome 或 Edge';return}let r=new SR();r.lang='en-US';r.interimResults=false;readState.textContent='🔴 正在录音，请朗读完整对话…';r.onresult=e=>{let heard=e.results[0][0].transcript.toLowerCase(),words=text.toLowerCase().replace(/[^a-z ]/g,' ').split(/\s+/).filter(x=>x.length>2),hit=words.filter(w=>heard.includes(w)).length/words.length;if(hit>=.55)heal(hit>=.8);else readState.textContent='朗读还不完整，请点击麦克风重新录音'};r.onerror=()=>readState.textContent='没有听清，请点击麦克风重新录音';r.start()}
function heal(good){S.hp=good?5:Math.max(S.hp,2.5);S.fails=0;S.x=320;S.y=Math.max(115,H*.67-25);save();ui();card.innerHTML=`<div class="stars">${good?'★★★':'★★'}</div><h2>${good?'氧气全满！':'恢复到 50%'}</h2><p>${good?'发音清楚、对话完整。':'已经完成补给，再注意连贯和音量。'}</p><button class="primary" id="go">返回救援任务</button>`;go.onclick=()=>{modal.classList.remove('show');busy=false}}
function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.78;speechSynthesis.speak(u)}function toast(t){let e=document.querySelector('#toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),1600)}ui();requestAnimationFrame(loop);
</script></body></html>
