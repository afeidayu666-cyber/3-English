<script>
// 会员有效期本地存储
let vipExpire = localStorage.getItem('gameVipTime') || 0;
const now = Date.now();
const trialParams = new URLSearchParams(location.search);
const trialMode = trialParams.get('trial') === '1min' ? '1min' : 'normal';
const trialKey = trialMode === '1min' ? 'gameTrialStart_1min_' + (trialParams.get('testid') || 'default') : 'gameTrialStart';
const trialLabel = trialMode === '1min' ? '1分钟测试' : '15分钟';
const trialMinutes = 15;
let trialStart = localStorage.getItem(trialKey);
if(!trialStart){
  trialStart = now;
  localStorage.setItem(trialKey, trialStart);
}
const trialMs = trialMode === '1min' ? 60 * 1000 : trialMinutes * 60 * 1000;
const trialExpired = now - Number(trialStart) >= trialMs;
// 客服解锁密码（你手动发给客户）
const monthCode = "game30day";  // 19.9 一年服务
const yearCode = "game365day";  // 兼容旧密码，也按一年服务处理

function showPaywall(){
  if(document.getElementById('paywallMask')) return;
  const html = `
  <div id="paywallMask" style="position:fixed;inset:0;z-index:999999;background:#17155c;color:#fff;padding:30px;text-align:center;box-sizing:border-box;overflow:auto;font-family:Microsoft YaHei,system-ui,sans-serif;">
    <h1 style="margin-top:20px;">月球救援：英语太空行动</h1>
    <div style="background:#fff3;color:#ffd343;padding:12px;border-radius:10px;width:300px;max-width:90%;margin:15px auto;font-size:17px;font-weight:bold;">免费试玩${trialLabel}已结束</div>
    <p style="font-size:20px;line-height:1.6;">添加客服微信，获取继续游戏密码</p>
    <div style="background:#ffd343;color:#000;padding:16px;border-radius:12px;width:290px;max-width:90%;margin:24px auto;font-size:20px;font-weight:900;">19.9 元｜永久使用</div>
    <div style="background:#fff;color:#17155c;padding:16px;border-radius:12px;width:290px;max-width:90%;margin:18px auto;font-size:22px;font-weight:900;">客服微信：facai9facai</div>
    <button onclick="navigator.clipboard&&navigator.clipboard.writeText('facai9facai');alert('客服微信已复制')" style="padding:12px 22px;border:none;border-radius:10px;background:#5cd097;color:#000;font-size:16px;font-weight:bold;">复制客服微信</button>
    <div style="margin-top:28px;">
      <p>输入客服给你的解锁密码，继续使用完整游戏</p>
      <input id="pwdInput" placeholder="输入解锁密码" style="padding:12px;width:260px;max-width:86%;font-size:16px;border-radius:8px;border:none;margin-top:10px;">
      <br>
      <button onclick="checkPassword()" style="margin-top:15px;padding:12px 30px;font-size:16px;background:#ff8fc7;border:none;border-radius:8px;font-weight:bold;">解锁进入游戏</button>
    </div>
    <p style="margin-top:40px;color:#ccc;font-size:14px;line-height:1.7;">提示：更换设备、清理浏览器缓存后需要重新输入密码。<br>微信内和浏览器内都会正常计时。</p>
  </div>`;
  if(document.body) document.body.insertAdjacentHTML('beforeend', html);
  else document.addEventListener('DOMContentLoaded', () => showPaywall(), {once:true});
}

// 判断是否过期，过期后直接弹客服微信，不清空游戏页面
if((Number(vipExpire) < now || trialMode === '1min') && trialExpired){
  showPaywall();
}

function checkPassword(){
  let inputVal = document.getElementById('pwdInput').value.trim();
  let expireMs;
  if(inputVal === monthCode || inputVal === yearCode){
    expireMs = Date.now() + 100 * 365 * 24 * 60 * 60 * 1000;
  }else{
    alert("密码错误，请核对客服发给你的密码");
    return;
  }
  localStorage.setItem('gameVipTime', expireMs);
  alert("解锁成功！刷新页面即可开始游戏");
  location.reload();
}
setInterval(function(){
  try{
    let vipExpireNow = Number(localStorage.getItem('gameVipTime') || 0);
    let trialStartNow = Number(localStorage.getItem(trialKey) || Date.now());
    if((vipExpireNow < Date.now() || trialMode === '1min') && Date.now() - trialStartNow >= trialMs){
      showPaywall();
    }
  }catch(e){}
}, 60000);
</script>
<script>
// 最终覆盖版：15分钟试玩 + 客服微信 faicai9facai + 19.9 一年服务。
// 这段放在旧试用逻辑后面，强制接管弹窗与到期检查，避免旧缓存/旧文案继续生效。
(function(){
  const finalTrialParams = new URLSearchParams(location.search);
  const finalTrialMode = finalTrialParams.get('trial') === '1min' ? '1min' : 'normal';
  const finalTrialKey = finalTrialMode === '1min'
    ? 'gameTrialStart_1min_' + (finalTrialParams.get('testid') || 'default')
    : 'gameTrialStart';
  const finalTrialMs = finalTrialMode === '1min' ? 60 * 1000 : 15 * 60 * 1000;
  const finalTrialLabel = finalTrialMode === '1min' ? '1分钟测试' : '15分钟';
  const finalWechat = 'faicai9facai';
  let finalTrialStart = Number(localStorage.getItem(finalTrialKey) || 0);
  if(!finalTrialStart){
    finalTrialStart = Date.now();
    localStorage.setItem(finalTrialKey, String(finalTrialStart));
  }
  const deviceInitKey = 'moonGameDeviceInit_v5';
  if(!localStorage.getItem(deviceInitKey)){
    localStorage.removeItem('pencil-island-save');
    localStorage.setItem(deviceInitKey, String(Date.now()));
  }
  if(localStorage.getItem('gamePaidUnlockV2') !== '1'){
    localStorage.removeItem('gameVipTime');
  }

  window.shouldShowPaywall = function(){
    const vipExpireNow = Number(localStorage.getItem('gameVipTime') || 0);
    const paidUnlock = localStorage.getItem('gamePaidUnlockV2') === '1';
    const trialStartNow = Number(localStorage.getItem(finalTrialKey) || finalTrialStart || Date.now());
    const trialLocked = localStorage.getItem('gameTrialExpiredLock') === '1';
    return (!paidUnlock || vipExpireNow < Date.now() || finalTrialMode === '1min') && (trialLocked || Date.now() - trialStartNow >= finalTrialMs);
  };

  window.showPaywall = function(){
    if(typeof window.trackGameEvent==='function')window.trackGameEvent('paywall_show',finalTrialMode);
    try{
      localStorage.setItem('gameTrialExpiredLock','1');
      localStorage.removeItem('pencil-island-save');
    }catch(e){}
    const old = document.getElementById('paywallMask');
    if(old) old.remove();
    document.documentElement.style.overflow = 'hidden';
    if(document.body) document.body.style.overflow = 'hidden';
    const html = `
    <div id="paywallMask" style="position:fixed;inset:0;z-index:999999;background:#17155c;color:#fff;padding:30px;text-align:center;box-sizing:border-box;overflow:auto;font-family:Microsoft YaHei,system-ui,sans-serif;">
      <h1 style="margin-top:20px;">月球救援：英语太空行动</h1>
      <div style="background:#fff3;color:#ffd343;padding:12px;border-radius:10px;width:300px;max-width:90%;margin:15px auto;font-size:17px;font-weight:bold;">免费试玩${finalTrialLabel}已结束</div>
      <p style="font-size:20px;line-height:1.6;">添加客服微信，获取继续游戏密码</p>
      <div style="background:#ffd343;color:#000;padding:16px;border-radius:12px;width:290px;max-width:90%;margin:24px auto;font-size:20px;font-weight:900;">19.9 元｜一年服务</div>
      <div style="background:#fff;color:#17155c;padding:16px;border-radius:12px;width:290px;max-width:90%;margin:18px auto;font-size:22px;font-weight:900;">客服微信：${finalWechat}</div>
      <button type="button" onclick="navigator.clipboard&&navigator.clipboard.writeText('${finalWechat}');alert('客服微信已复制')" style="padding:12px 22px;border:none;border-radius:10px;background:#5cd097;color:#000;font-size:16px;font-weight:bold;">复制客服微信</button>
      <div style="margin-top:28px;">
        <p>输入客服给你的解锁密码，继续使用完整游戏</p>
        <input id="pwdInput" placeholder="输入解锁密码" style="padding:12px;width:260px;max-width:86%;font-size:16px;border-radius:8px;border:none;margin-top:10px;">
        <br>
        <button type="button" onclick="checkPassword()" style="margin-top:15px;padding:12px 30px;font-size:16px;background:#ff8fc7;border:none;border-radius:8px;font-weight:bold;">解锁进入游戏</button>
      </div>
      <p style="margin-top:40px;color:#ccc;font-size:14px;line-height:1.7;">同一浏览器会自动记录试玩时间；到期后重新打开也会显示本界面。<br>更换设备、清理浏览器缓存后需要重新输入密码。</p>
    </div>`;
    if(document.body) document.body.insertAdjacentHTML('beforeend', html);
    else document.addEventListener('DOMContentLoaded', () => window.showPaywall(), {once:true});
  };

  window.checkPassword = function(){
    const input = document.getElementById('pwdInput');
    const inputVal = input ? input.value.trim() : '';
    if(inputVal !== 'game30day' && inputVal !== 'game365day'){
      alert('密码错误，请核对客服发给你的密码');
      return;
    }
    localStorage.setItem('gameVipTime', String(Date.now() + 365 * 24 * 60 * 60 * 1000));
    localStorage.setItem('gamePaidUnlockV2','1');
    localStorage.removeItem('gameTrialExpiredLock');
    if(typeof window.trackGameEvent==='function')window.trackGameEvent('unlock_success','one_year');
    alert('解锁成功！一年服务已开启，刷新后即可继续游戏。');
    location.reload();
  };

  window.enforcePaywall = function(){
    try{
      if(window.shouldShowPaywall()) window.showPaywall();
    }catch(e){
      console.error('paywall check failed', e);
    }
  };

  window.enforcePaywall();
  document.addEventListener('DOMContentLoaded', window.enforcePaywall);
  window.addEventListener('pageshow', window.enforcePaywall);
  window.addEventListener('focus', window.enforcePaywall);
  document.addEventListener('visibilitychange', () => {
    if(!document.hidden) window.enforcePaywall();
  });
  setInterval(window.enforcePaywall, 3000);
})();
</script>

 card.querySelectorAll('[data-letter]').forEach(b=>b.addEventListener('click',()=>{ans+=b.dataset.letter;b.disabled=true;answerEl.textContent=ans}));
 clearBtn.addEventListener('click',()=>renderSpell(q,o,correction,mustReturn));
 let submitting=false;const submitAnswer=()=>{if(submitting)return;submitting=true;submitBtn.disabled=true;submitBtn.textContent='正在检查…';if(ans.toLowerCase()===target){if(mustReturn){S.xp+=10;save();ui();submitBtn.textContent='正确，返回补给舱';setTimeout(()=>{modal.classList.remove('show');headquarters()},120)}else{submitBtn.textContent='正确，继续前进';finish(true,o,q.word)}}else if(correction){submitting=false;submitBtn.disabled=false;submitBtn.textContent='检查并继续';answerEl.textContent=ans||'?';answerEl.style.color='#e23858';tone(150,.16);toast('还差一点，请照着正确答案重新拼')}else{S.hp=Math.max(0,S.hp-1);S.fails++;let back=S.hp<=0||S.fails>=5;save();ui();tone(150,.18);renderSpell(q,o,true,back)}};
 let submitTapAt=0;const submitTap=e=>{e.preventDefault();let now=Date.now();if(now-submitTapAt<400)return;submitTapAt=now;submitAnswer()};submitBtn.addEventListener('pointerup',submitTap);submitBtn.addEventListener('click',submitTap);
}
function talk(q,o){card.innerHTML=`<span class="tag">${q.grade} · ${q.unit||''}</span><h2>英语对话暗号</h2><div class="speech">👽 ${q.q}<br><small>${cnText(q.q)}</small></div><div class="hint">选择最自然的下一句，再看中文意思</div><div class="options">${q.options.map((x,i)=>`<button type="button" data-a="${i}">${x}<br><small>${cnText(x)}</small></button>`).join('')}</div><button type="button" class="secondary" id="listen">🔊 听问题</button>`;modal.classList.add('show');bindReliableTap(card.querySelector('#listen'),()=>speak(q.q));card.querySelectorAll('[data-a]').forEach(b=>bindReliableTap(b,()=>{b.classList.add(+b.dataset.a===q.a?'correct':'wrong');setTimeout(()=>finish(+b.dataset.a===q.a,o,q.options[q.a]),350)}))}
function finish(ok,o,correct){if(ok){S.xp+=20;S.fails=0;if(o.k==='monster'||o.k==='boss')return rewardChoice(o);if(!S.cleared.includes(o.id))S.cleared.push(o.id);modal.classList.remove('show');busy=false;toast(o.mode==='dialogue'?'火星暗号正确，通道开启！':'任务完成！');speak('Great job!')}else{S.hp--;S.fails++;ui();if(S.hp<=0||S.fails>=5){modal.classList.remove('show');setTimeout(headquarters,350)}else{card.innerHTML+=`<div class="speech">❌ 暗号错误！正确答案：<b>${correct}</b></div><button type="button" class="primary" id="again">记住了，继续</button>`;bindReliableTap(card.querySelector('#again'),()=>{modal.classList.remove('show');busy=false})}}save();ui()}
function rewardChoice(o){speak('Great job!');card.innerHTML=`<div class="stars">★★★</div><h2>回答正确！</h2><p>获得20经验。选择本次任务奖励：</p><button type="button" class="primary" id="oneShot">❄️ 获得一发冰冻弹</button><button type="button" class="secondary" id="defeatNow">💥 消灭${o.label}</button>`;let freezeBtn=card.querySelector('#oneShot'),defeatBtn=card.querySelector('#defeatNow');bindReliableTap(freezeBtn,()=>guarded('领取冰冻弹',()=>{freezeBtn.disabled=true;freezeBtn.textContent='装备中…';S.gun=true;S.weaponMode='freeze';freezeTargetId=o.id;save();ui();autoEncounterId=o.id;resumeWorld('冰冻枪已装备：点击宇航员发射冰柱')}));bindReliableTap(defeatBtn,()=>guarded('直接消灭怪物',()=>{defeatBtn.disabled=true;defeatBtn.textContent='处理中…';if(!S.cleared.includes(o.id))S.cleared.push(o.id);if(o.ambush){let index=objects.indexOf(o);if(index>=0)objects.splice(index,1);nextAmbushAt=Date.now()+12000+Math.random()*9000}else o.respawnAt=Date.now()+15000;save();ui();resumeWorld(o.ambush?'突袭怪被消灭，暂时安全！':o.label+'被消灭！15秒后出现新怪物')}))}
function resetMission(){let fromCheckpoint=S.chapter>=2&&S.chapterCelebrated;S.x=fromCheckpoint?5150:320;S.y=Math.max(115,H*.67-25);S.hp=5;S.xp=fromCheckpoint?S.checkpointXp:0;S.cleared=fromCheckpoint?[...S.checkpointCleared]:[];S.fails=0;S.gun=false;S.weaponMode='freeze';S.cursor=fromCheckpoint?S.checkpointCursor:0;S.refills=0;if(!fromCheckpoint){S.chapter=1;S.chapterCelebrated=false;S.checkpointXp=0;S.checkpointCursor=0;S.checkpointCleared=[]}letterBullets=[];objects.filter(o=>o.ambush).forEach(o=>objects.splice(objects.indexOf(o),1));objects.forEach(o=>{o.phase=0;o.frozenUntil=0;o.respawnAt=0});save();ui();busy=true;card.innerHTML=`<div class="stars">🚀</div><h2>氧气补给次数已用完</h2><p>${fromCheckpoint?'从第二环节检查点重新开始，前三关进度已经保留。':'第一环节任务重新开始，经验、武器和关卡进度已经重置。'}</p><button type="button" class="primary" id="restartMission">${fromCheckpoint?'重启第二环节':'从第一关重新出发'}</button>`;modal.classList.add('show');let restartBtn=card.querySelector('#restartMission');bindReliableTap(restartBtn,()=>{restartBtn.disabled=true;modal.classList.remove('show');busy=false;toast(fromCheckpoint?'任务重启：第二环节·冰雪星球':'任务重启：第一关·月球救援')})}
function headquarters(){if(S.refills>=2)return resetMission();S.refills++;save();busy=true;let dialogList=activeDialogs(),text=dialogList[Math.floor(Math.random()*dialogList.length)],left=2-S.refills;card.innerHTML=`<span class="tag">🚀 救援太空舱 · 氧气补给 ${S.refills}/2</span><h2>生命维持舱</h2><div class="speech" style="white-space:pre-line">${dialogWithCn(text)}</div><div class="hint">本局补给后还可返回 ${left} 次。先听示范，再按住麦克风读完整段对话。</div><div><button type="button" class="secondary" id="demo">🔊 听示范</button></div><button class="mic" id="mic"><span class="mic-icon">🎙️</span><span class="mic-text">按住补给</span><span class="mic-wave"><span></span><span></span><span></span><span></span></span></button><div id="readState" class="hint">按住麦克风开始，说完松手自动补给</div>`;modal.classList.add('show');bindReliableTap(card.querySelector('#demo'),()=>speak(text.replaceAll(/A:|B:/g,'')));bindHoldToRecord('mic','readState',{listeningText:'正在录音，请按住读完整段对话',evaluate:heard=>{let words=text.toLowerCase().replace(/[^a-z ]/g,' ').split(/\s+/).filter(x=>x.length>2),hit=words.filter(w=>heard.includes(w)).length/words.length;return hit>=.55?{ok:true,good:hit>=.8,successText:hit>=.8?'补给成功，氧气全满':'补给完成，恢复一半氧气'}:{ok:false,failText:'采集到了声音，但对话还不够完整，再按住读一遍'}},onSuccess:result=>heal(result.good)})}
function heal(good){S.hp=good?5:Math.max(S.hp,2.5);S.fails=0;S.x=320;S.y=Math.max(115,H*.67-25);save();ui();card.innerHTML=`<div class="stars">${good?'★★★':'★★'}</div><h2>${good?'氧气全满！':'恢复到 50%'}</h2><p>${good?'发音清楚、对话完整。':'已经完成补给，再注意连贯和音量。'}</p><button type="button" class="primary" id="go">返回救援任务</button>`;let goBtn=card.querySelector('#go'),goAt=0,leave=e=>{e.preventDefault();let now=Date.now();if(now-goAt<400)return;goAt=now;goBtn.disabled=true;goBtn.textContent='正在返回…';modal.classList.remove('show');busy=false;toast('已返回救援任务')};goBtn.addEventListener('pointerup',leave);goBtn.addEventListener('click',leave)}
let fallbackVoice=null;function playOnlineVoice(t){try{fallbackVoice?.pause();fallbackVoice=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(t)+'&type=2');fallbackVoice.preload='auto';fallbackVoice.play().catch(()=>toast('示范音播放失败，请检查网络后重试'))}catch{toast('示范音播放失败，请检查网络后重试')}}function speak(t){if(/Android/i.test(navigator.userAgent))return playOnlineVoice(t);let synth=window.speechSynthesis,voices=[];try{voices=synth?.getVoices?.()||[]}catch{}if(!synth||!window.SpeechSynthesisUtterance)return playOnlineVoice(t);try{synth.cancel();let u=new SpeechSynthesisUtterance(t),started=false,fellBack=false;u.lang='en-US';u.rate=.78;u.onstart=()=>started=true;u.onerror=()=>{if(!fellBack){fellBack=true;playOnlineVoice(t)}};synth.speak(u);setTimeout(()=>{if(!started&&!synth.speaking&&!fellBack){fellBack=true;synth.cancel();playOnlineVoice(t)}},900)}catch{playOnlineVoice(t)}}function toast(t){let e=document.querySelector('#toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),1600)}ui();const gameClock=setInterval(()=>loop(performance.now()),MOBILE_SAFE?66:50);loop(performance.now());
</script></body></html>
