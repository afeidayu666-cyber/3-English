function checkPassword(){
  let inputVal = document.getElementById('pwdInput').value.trim();
  let expireMs;
  if(inputVal === monthCode){
    expireMs = Date.now() + 30 * 24 * 60 * 1000;
  }else if(inputVal === yearCode){

  }else{
